services:
  app:
    build: ./docker/php
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PHP_FPM_PM=dynamic

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public
      - ./template:/var/www/html/template
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 5s

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: ${DB_NAME:-iwea}
      MYSQL_USER: ${DB_USER:-iwea}
      MYSQL_PASSWORD: ${DB_PASS:-iwea}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./docker/mysql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
