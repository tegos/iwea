name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint PHP files
        run: find src -name '*.php' | xargs -P4 php -l | grep -v "No syntax errors" || true

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite Unit --testdox

  feature:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/php
          load: true
          tags: iwea-app:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/nginx
          load: true
          tags: iwea-nginx:latest
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,scope=nginx,mode=max

      - name: Prepare
        run: mkdir -p data/cache data/logs && chmod 777 data/cache data/logs && cp .env.ci .env

      - name: Start services
        run: docker compose up -d --wait

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run feature tests
        env:
          APP_URL: http://localhost:8080
        run: vendor/bin/phpunit --testsuite Feature --testdox

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs
